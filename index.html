<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: linear-gradient(to bottom, #ffccd5, #fff);
  text-align: center;
}

h1 {
  padding: 20px;
}

.card {
  background: white;
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

button {
  padding: 12px 20px;
  background: #ff4d6d;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

img {
  width: 90%;
  border-radius: 10px;
  margin-top: 10px;
}

#secret {
  display: none;
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>❤️ for the most amazing women in the galaxy ❤️</h1>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- LOVE BUTTON -->
<div class="card">
  <h2>Tap This 💌</h2>
  <button onclick="showMessage()">Tap Me</button>
  <p id="message"></p>
</div>

<!-- PHOTOS -->
<div class="card">
  <h2>Our Memories 📸</h2>
  <img src="IMG_0069.jpeg">
  <img src="IMG_0018.jpeg">
  <img src="IMG_9810.jpeg">
</div>

<!-- SECRET MESSAGE -->
<div class="card">
  <h2>🔐 Secret</h2>
  <button onclick="unlockSecret()">Unlock</button>
  <p id="secret">you are the best thing that’s ever happened to me. I love you more than anything you have shown me so much and im thankful for you every day I will love you till the day i take my last breathe ❤️</p>
</div>
<!-- EMOTIONAL BUTTONS -->
<div class="card">
  <h2>💭 Open When...</h2>

  <button onclick="sadMessage()">When you're sad</button>
  <p id="When life gets hard rememberyou are the keeper of your happiness you make the world move and that you can do anything you put your mind to youre an amazing human who is capable of conquring the world"></p>

  <br><br>

  <button onclick="loveReminder()">Reminder I love you</button>
  <p id="IF you are ever questioning if i love you here is why i love you, you make life so fun and speical when your around you make my heart skip. 
    I knew when we matched that day that I was gonna marry you and take care of you for life meeting you has been the best thing thats ever happened to me you mean so much to me"></p>
</div>
  
<script>
function showMessage() {
  const messages = [
     "I love you more than I can ever explain ❤️",
    "You are the best thing in my life.",
    "I’d choose you in every lifetime.",
    "You make my world better just by being in it.",
    "You mean everything to me."
  ];
  const random = messages[Math.floor(Math.random() * messages.length)];
  document.getElementById("message").innerText = random;
}

function unlockSecret() {
  const password = prompt("Enter the secret password:");
  if (password === "Theonepiece") {
    document.getElementById("secret").style.display = "block";
  } else {
    alert("Wrong password 😢");
  }
}
</script>

</body>
</html>
