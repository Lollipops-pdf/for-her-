<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: linear-gradient(to bottom, #ffccd5, #fff);
  text-align: center;
}

h1 {
  padding: 20px;
}

.card {
  background: white;
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

button {
  padding: 12px 20px;
  background: #ff4d6d;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

img {
  width: 90%;
  border-radius: 10px;
  margin-top: 10px;
}

#secret {
  display: none;
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>❤️ For You ❤️</h1>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- LOVE BUTTON -->
<div class="card">
  <h2>Tap This 💌</h2>
  <button onclick="showMessage()">Tap Me</button>
  <p id="message"></p>
</div>

<!-- PHOTOS -->
<div class="card">
  <h2>Our Memories 📸</h2>
  <img src="photo1.jpg">
  <img src="photo2.jpg">
</div>

<!-- SECRET MESSAGE -->
<div class="card">
  <h2>🔐 Secret</h2>
  <button onclick="unlockSecret()">Unlock</button>
  <p id="secret">You are the best thing that’s ever happened to me. I love you more than anything ❤️</p>
</div>

<script>
function showMessage() {
  const messages = [
    "I love you ❤️",
    "You make my life better",
    "You’re my favorite person",
    "I’d choose you every time"
  ];
  const random = messages[Math.floor(Math.random() * messages.length)];
  document.getElementById("message").innerText = random;
}

function unlockSecret() {
  const password = prompt("Enter the secret password:");
  if (password === "iloveyou") {
    document.getElementById("secret").style.display = "block";
  } else {
    alert("Wrong password 😢");
  }
}
</script>

</body>
</html>
